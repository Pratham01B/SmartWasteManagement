spring:
  application:
    name: smartwaste-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db.grrtfxieugqfwigskfwl.supabase.co:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:Sm@rtW@ste1331}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Use Flyway/SQL scripts for schema; never auto-create in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never                 # Schema managed via schema.sql manually

server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000            # 24 hours in ms
  refresh-expiration: 604800000   # 7 days in ms

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
